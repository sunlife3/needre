# needre configuration
#
# Settings are grouped into categories written as a name in brackets, e.g.
# [processmonitor]. Each parameter under a category is a "key value" pair
# separated by whitespace, e.g. "directory /tmp". `#` starts a comment; blank
# lines are ignored.
#
# Install this file at /etc/needre/needre.conf, or point needre at a different
# location with the NEEDRE_CONFIG environment variable.

# Directories to monitor. An execve whose binary path starts with any of these
# prefixes raises a detection (alert log + process-tree trace). Repeat the
# `directory` key to monitor multiple directories.
[processmonitor]
directory /tmp
directory /dev/shm
directory /var/tmp
